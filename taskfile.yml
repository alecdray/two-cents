version: "3"

dotenv:
  - .env

vars: {}

tasks:
  default:
    cmds:
      - task -a
  build/templ:
    cmds:
      - templ generate
  build/tailwind:
    cmds:
      - npx @tailwindcss/cli -i ./static/src/main.css -o ./static/public/main.css
  build/icons:
    desc: Render PNG app icons from favicon.svg (the single source mark). Run after editing favicon.svg; commit the outputs (the Docker build has no rsvg-convert). Needs librsvg (`brew install librsvg`).
    vars:
      SRC: ./static/public/favicon.svg
      BG: "#0d1117"
    cmds:
      - rsvg-convert -b "{{.BG}}" -w 180 -h 180 {{.SRC}} -o ./static/public/apple-touch-icon.png
      - rsvg-convert -b "{{.BG}}" -w 192 -h 192 {{.SRC}} -o ./static/public/icon-192.png
      - rsvg-convert -b "{{.BG}}" -w 512 -h 512 {{.SRC}} -o ./static/public/icon-512.png
  build/sqlc:
    desc: Generate type-safe query code (once db/queries/ has queries)
    cmds:
      - sqlc generate
  build/server:
    cmds:
      - go build -v -o ./bin/app ./src/cmd/app.go
  build:
    desc: Build everything needed to run
    cmds:
      - task build/sqlc build/templ build/tailwind build/server
  run:
    cmds:
      - go run ./src/cmd/app.go
  auth/set-password:
    desc: Set or rotate the single local login password — AUTH_PASSWORD=<pw> task auth/set-password
    cmds:
      - go run ./src/cmd/setpassword
  dev/templ:
    cmds:
      - templ generate --watch --proxy="http://localhost:$PORT" --open-browser=false -v 2>&1 | tee ./tmp/dev-templ.log
  dev/server:
    cmds:
      - >
        air
        --build.cmd "go build -v -o ./bin/app ./src/cmd/app.go"
        --build.entrypoint "./bin/app"
        --build.delay "100"
        --build.exclude_dir "node_modules"
        --build.include_ext "go"
        --build.stop_on_error false
        2>&1 | tee ./tmp/dev-server.log
  dev/tailwind:
    cmds:
      - npx --yes @tailwindcss/cli -i ./static/src/main.css -o ./static/public/main.css --watch 2>&1 | tee ./tmp/dev-tailwind.log
  dev/sync-assets:
    cmds:
      - >
        air
        --build.cmd "templ generate --notify-proxy"
        --build.delay "100"
        --build.exclude_dir "node_modules"
        --build.include_ext "templ,css"
  dev:
    deps:
      - dev/server
      - dev/tailwind
      - dev/templ
      - dev/sync-assets
  db/create:
    desc: Create a new goose migration — task db/create -- <name>
    cmds:
      - goose -dir db/migrations create {{.CLI_ARGS}} sql
  db/up:
    desc: Run migrations, snapshot schema, regenerate sqlc
    cmds:
      - goose up
      - sqlite3 $GOOSE_DBSTRING .schema > ./db/schema.sql
      - sqlc generate
  test/unit:
    desc: Run Go unit tests
    cmds:
      - go test ./src/...
  test/e2e:
    desc: Run Playwright E2E tests (requires app running)
    cmds:
      - npx playwright test {{.CLI_ARGS}}
  test:
    desc: Run all tests
    cmds:
      - task test/unit
  docker/build:
    cmds:
      - docker build -t twocents .
  docker/run:
    cmds:
      - >
        docker run -d
        -p $PORT:$PORT
        -v ${DOCKER_DATA_DIR:-twocents-data}:/data
        -e ENV=${ENV:-production}
        -e PORT=$PORT
        twocents
