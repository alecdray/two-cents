<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Spherical coin shading: light catches the upper-left, rim falls off dark. -->
    <radialGradient id="coin" cx="0.38" cy="0.32" r="0.85">
      <stop offset="0" stop-color="#5fd07a"/>
      <stop offset="0.5" stop-color="#2ea043"/>
      <stop offset="1" stop-color="#19752f"/>
    </radialGradient>
    <!-- Drop shadow that lifts the coin off the background. -->
    <filter id="coinShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0.6" stdDeviation="0.7" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <!-- Soft shadow under the ¢ so it reads as raised off the coin face. -->
    <filter id="symShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0.35" stdDeviation="0.3" flood-color="#0a4a1d" flood-opacity="0.65"/>
    </filter>
  </defs>
  <circle cx="16" cy="15.6" r="13.7" fill="url(#coin)" filter="url(#coinShadow)"/>
  <!-- Edge sheen. -->
  <circle cx="16" cy="15.6" r="13.7" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="0.5"/>
  <!-- x/y tuned to the glyph's ink bbox center (not font metrics); see static/CLAUDE.md. -->
  <!-- Light top bevel sits behind the dark glyph; the dark glyph + drop shadow complete the raised look. -->
  <text x="15.75" y="19.65" font-family="Georgia, serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#9bf0b1" fill-opacity="0.55">¢</text>
  <text x="15.75" y="19.95" font-family="Georgia, serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#0d1117" filter="url(#symShadow)">¢</text>
</svg>
